{{#extend "layout"}}

{{#content "body"}}
<td align="center">
    <table width="85%" cellpadding="0" cellspacing="0" border="0">
        <tbody>
            <tr>
                <td style="font-family:'Open Sans',arial,sans-serif!important;font-size:15px!important;line-height:28px!important;color:#333333;">
                    <strong>Vehicle :</strong> {{vehicleName}}
                </td>
            </tr>

            <tr>
                <td style="font-family:'Open Sans',arial,sans-serif!important;font-size:15px!important;line-height:28px!important;color:#333333;">
                    {{message}}
                </td>
            </tr>

            <tr>
                <td style="font-family:'Open Sans',arial,sans-serif!important;font-size:15px!important;line-height:28px!important;color:#333333;">
                    <strong>Time :</strong> {{time}}
                </td>
            </tr>

            <tr>
                <td style="height:20px;">&nbsp;</td>
            </tr>
        </tbody>
    </table>
</td>
{{/content}}

{{/extend}}
